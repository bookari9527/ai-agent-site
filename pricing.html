<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定价 - 后裔AI公司</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #0a0a0f; color: #f0ede8; min-height: 100vh; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    header { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #c44a1e, #d4895a); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo h1 { font-size: 20px; background: linear-gradient(90deg, #c44a1e, #d4895a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav a { color: #9a9590; text-decoration: none; margin-left: 24px; font-size: 14px; }
    .nav a:hover { color: #d4895a; }
    .hero { text-align: center; padding: 60px 0 40px; }
    .hero h2 { font-size: 36px; margin-bottom: 16px; }
    .hero p { color: #9a9590; font-size: 18px; max-width: 500px; margin: 0 auto; }
    .pricing { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; padding: 40px 0 80px; }
    .price-card { background: #1c1c28; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; text-align: center; transition: all 0.3s; }
    .price-card:hover { transform: translateY(-4px); border-color: rgba(255,100,50,0.5); }
    .price-card.featured { border-color: #c44a1e; position: relative; }
    .price-card.featured::before { content: '最受欢迎'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #c44a1e; color: #fff; padding: 4px 16px; border-radius: 20px; font-size: 12px; }
    .price-card h3 { font-size: 20px; margin-bottom: 8px; }
    .price { font-size: 36px; font-weight: bold; margin: 16px 0; }
    .price span { font-size: 16px; font-weight: normal; color: #9a9590; }
    .price-card ul { list-style: none; text-align: left; margin: 20px 0; }
    .price-card li { padding: 8px 0; color: #9a9590; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .price-card li::before { content: '?'; color: #4caf50; margin-right: 8px; }
    .btn { display: inline-block; padding: 12px 32px; background: linear-gradient(135deg, #c44a1e, #d4622e); color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; width: 100%; }
    footer { text-align: center; padding: 30px 0; border-top: 1px solid rgba(255,255,255,0.05); color: #9a9590; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><div class="logo-icon">??</div><h1>后裔AI</h1></div>
      <nav class="nav"><a href="index.html">首页</a><a href="#">定价</a></nav>
    </header>
    <section class="hero">
      <h2>简单透明的定价</h2>
      <p>选择适合你的方案，让AI为你工作</p>
    </section>
    <div class="pricing">
      <div class="price-card">
        <h3>入门版</h3>
        <div class="price">￥99<span>/月</span></div>
        <ul>
          <li>AI 对话助手</li>
          <li>每日 100 次请求</li>
          <li>基础模型</li>
          <li>邮件支持</li>
        </ul>
        <a href="#" class="btn">立即开始</a>
      </div>
      <div class="price-card featured">
        <h3>专业版</h3>
        <div class="price">￥299<span>/月</span></div>
        <ul>
          <li>全部AI能力</li>
          <li>每日 1000 次请求</li>
          <li>高级模型</li>
          <li>飞书集成</li>
          <li>优先支持</li>
        </ul>
        <a href="#" class="btn">立即开始</a>
      </div>
      <div class="price-card">
        <h3>企业版</h3>
        <div class="price">￥999<span>/月</span></div>
        <ul>
          <li>无限请求</li>
          <li>专属AI助手</li>
          <li>定制开发</li>
          <li>7×24 支持</li>
          <li>私有部署</li>
        </ul>
        <a href="#" class="btn">联系我们</a>
      </div>
    </div>
    <footer><p>? 2026 后裔AI公司</p></footer>
  </div>
</body>
</html>
